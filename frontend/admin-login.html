<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tajwid Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-bg min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 opacity-20 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-neon-gold rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-64 h-64 bg-neon-green rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
    </div>

    <div class="cyber-card p-10 w-full max-w-md mx-4 relative z-10 border border-neon-gold/30 shadow-[0_0_15px_rgba(255,215,0,0.2)]">
        <div class="text-center mb-8">
            <img src="img/logo.jpeg" alt="Logo Al-Firqoh" class="mx-auto h-20 w-20 mb-4 rounded-full border-2 border-neon-gold shadow-[0_0_15px_rgba(255,215,0,0.5)]">
            <h2 class="cyber-header text-2xl tracking-wider">ADMIN PORTAL</h2>
            <p class="text-gray-400 text-sm mt-2">Masuk dengan Email & Password</p>
        </div>
        
        <form id="adminLoginForm">
            <input type="hidden" id="role" value="admin">
            <div class="mb-4">
                <label class="block text-sm mb-2 text-neon-gold font-rajdhani tracking-wider">EMAIL ADMIN</label>
                <input type="email" id="email" class="w-full bg-dark-bg border border-neon-gold/50 focus:border-neon-gold focus:shadow-[0_0_10px_rgba(255,215,0,0.3)] text-white p-3 rounded outline-none transition-all duration-300 font-rajdhani" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm mb-2 text-neon-gold font-rajdhani tracking-wider">PASSWORD</label>
                <input type="password" id="password" class="w-full bg-dark-bg border border-neon-gold/50 focus:border-neon-gold focus:shadow-[0_0_10px_rgba(255,215,0,0.3)] text-white p-3 rounded outline-none transition-all duration-300 font-rajdhani" required>
            </div>
            
            <button type="submit" class="w-full py-4 bg-transparent border-2 border-neon-gold text-neon-gold hover:bg-neon-gold hover:text-dark-bg font-bold rounded transition-all duration-300 flex items-center justify-center shadow-[0_0_10px_rgba(255,215,0,0.2)] hover:shadow-[0_0_20px_rgba(255,215,0,0.6)] font-orbitron tracking-wider">
                <i class="fas fa-sign-in-alt mr-2"></i> LOGIN SEBAGAI ADMIN
            </button>
        </form>
        
        <div id="message" class="mt-6 text-center text-sm font-rajdhani text-lg"></div>
        
        <div class="mt-8 pt-6 border-t border-gray-700/50 text-center">
            <a href="login.html" class="text-sm text-gray-400 hover:text-white transition-colors duration-300 flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Login Siswa
            </a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const loginForm = document.getElementById('adminLoginForm');
        const messageDiv = document.getElementById('message');
        
        function showMessage(msg, isError = false) {
            messageDiv.innerHTML = `<div class="${isError ? 'text-red-400' : 'text-neon-gold'}">${msg}</div>`;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                showMessage('Memproses otentikasi...');
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Simpan data login
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('userRole', result.user.role);
                    localStorage.setItem('userId', result.user.id);
                    localStorage.setItem('username', result.user.username);
                    // Hapus walletAddress jika sebelumnya ada, karena kita tidak login via Web3
                    localStorage.removeItem('walletAddress');
                    
                    showMessage('<span class="text-neon-green"><i class="fas fa-check-circle mr-2"></i>Otentikasi Berhasil! Mengarahkan ke Dashboard...</span>');
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    showMessage(`<i class="fas fa-exclamation-triangle mr-2"></i>${result.message}`, true);
                }
            } catch (error) {
                console.error("Login Error:", error);
                showMessage('<i class="fas fa-times-circle mr-2"></i>Gagal terhubung ke server', true);
            }
        });
    </script>
</body>
</html>
